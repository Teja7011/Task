<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        button { display: block; width: 250px; padding: 10px; margin: 10px 0; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Employee Management System (Dashboard)</h2>
    <p>Open your browser console (F12 -> Console) to see the logs and data output!</p>

    <button onclick="addEmployee()">1. Add Employee</button>
    <button onclick="viewEmployees()">2. View All Employees</button>
    <button onclick="searchEmployee()">3. Search Employee by ID</button>
    <button onclick="calculateSalary()">4. Calculate Salary with Bonus</button>
    <button onclick="checkExperience()">5. Check Experience Level</button>
    <button onclick="deleteEmployee()">6. Delete Employee</button>

    <script src="script.js"></script>

</body>
</html>
